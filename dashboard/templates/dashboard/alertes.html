{% extends 'dashboard/base.html' %}
{% block title %}Alertes – SecuIA{% endblock %}

{% block content %}
<div class="page-title">
  <i class="bi bi-exclamation-triangle text-primary"></i> Alertes
</div>

<!-- KPIs -->
<div class="row g-3 mb-4">
  <div class="col-6 col-md-3">
    <div class="kpi">
      <div class="kpi-value text-danger">0</div>
      <div class="kpi-label">Critiques</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="kpi">
      <div class="kpi-value text-warning">0</div>
      <div class="kpi-label">Élevées</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="kpi">
      <div class="kpi-value text-info">0</div>
      <div class="kpi-label">Nouvelles (24h)</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="kpi">
      <div class="kpi-value text-secondary">0</div>
      <div class="kpi-label">Non traitées</div>
    </div>
  </div>
</div>

<!-- Filtres -->
<div class="card mb-4">
  <div class="card-header"><i class="bi bi-funnel"></i> Filtres</div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-3">
        <label class="form-label">Sévérité</label>
        <select class="form-select" id="severity">
          <option>Toutes</option>
          <option>Critique</option>
          <option>Élevée</option>
          <option>Moyenne</option>
          <option>Faible</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Statut</label>
        <select class="form-select" id="status">
          <option>Tous</option>
          <option>Nouvelle</option>
          <option>En cours</option>
          <option>Résolue</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Application</label>
        <select class="form-select" id="app">
          <option>Toutes</option>
          <option>App Web 1</option>
          <option>App Web 2</option>
        </select>
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100">Appliquer</button>
      </div>
    </div>
  </div>
</div>

<!-- Tableau des alertes -->
<div class="card">
  <div class="card-header"><i class="bi bi-table"></i> Liste des alertes</div>
  <div class="card-body p-0">
    <div class="empty-state">
      <i class="bi bi-robot"></i>
      <p><strong>Aucune alerte</strong></p>
      <p>Les vulnérabilités détectées apparaîtront ici.</p>
    </div>
  </div>
</div>
{% endblock %}
