<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SecuIA – Dashboard{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg-main:    #f0f2f5;      /* Fond principal CLAIR */
      --bg-card:    #ffffff;      /* Cartes BLANCHES */
      --bg-hover:   #f8f9fa;      /* Hover gris clair */
      --border:     #dee2e6;      /* Bordure gris clair */
      --text-main:  #1a1a2e;      /* Texte foncé */
      --text-muted: #6c757d;      /* Texte gris */
      --blue:       #0d6efd;      /* Bleu Bootstrap */
      --danger:     #dc3545;
      --warning:    #fd7e14;
      --success:    #198754;
      --info:       #0dcaf0;
    }

    * { box-sizing: border-box; }
    body { background: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; }

    /* ── Sidebar (fond bleu foncé, on garde) ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 230px; background: linear-gradient(135deg, #1e3a5f 0%, #0f2b44 100%);
      border-right: none;
      display: flex; flex-direction: column; z-index: 200;
    }
    .sidebar-brand {
      padding: 1.2rem 1rem 1rem;
      font-size: 1.05rem; font-weight: 700; color: #60a5fa;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; gap: .5rem;
    }
    .sidebar-brand small { font-size: .65rem; color: rgba(255,255,255,0.5); font-weight: 400; margin-top: 2px; display: block; }
    .nav-section { padding: .6rem 1rem .2rem; font-size: .7rem; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,0.5); }
    .sidebar .nav-link {
      display: flex; align-items: center; gap: .55rem;
      padding: .5rem 1rem; margin: 1px 6px; border-radius: 6px;
      color: rgba(255,255,255,0.7); font-size: .88rem; text-decoration: none;
      transition: background .15s, color .15s;
    }
    .sidebar .nav-link:hover   { background: rgba(255,255,255,0.1); color: white; }
    .sidebar .nav-link.active  { background: rgba(255,255,255,0.15); color: white; border-left: 3px solid #60a5fa; padding-left: calc(1rem - 3px); }
    .sidebar-footer { margin-top: auto; padding: .8rem 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: .72rem; color: rgba(255,255,255,0.5); }

    /* ── Contenu principal ── */
    .main { margin-left: 230px; padding: 1.8rem 2rem; min-height: 100vh; background: var(--bg-main); }
    .page-title { font-size: 1.35rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: .5rem; color: var(--text-main); }

    /* ── Cards ── */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; }
    .card-header { background: var(--bg-hover); border-bottom: 1px solid var(--border); padding: .6rem 1rem; font-size: .82rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── KPI ── */
    .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem 1rem; text-align: center; }
    .kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .kpi-label { font-size: .78rem; color: var(--text-muted); margin-top: .35rem; }

    /* ── Tables ── */
    .table { color: var(--text-main); margin: 0; }
    .table thead th { color: var(--text-muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; border-color: var(--border); padding: .55rem 1rem; font-weight: 600; }
    .table tbody td { border-color: #e9ecef; padding: .6rem 1rem; vertical-align: middle; font-size: .875rem; }
    .table tbody tr:hover { background: var(--bg-hover); }

    /* ── Badges ── */
    .badge-critique { background: var(--danger) !important; color: white !important; }
    .badge-eleve    { background: var(--warning) !important; color: white !important; }
    .badge-moyen    { background: var(--info)    !important; color: black !important; }
    .badge-faible   { background: #6c757d        !important; color: white !important; }
    .badge-info     { background: #e9ecef        !important; color: var(--text-muted) !important; border: 1px solid var(--border); }
    .owasp-tag { font-family: monospace; font-size: .78rem; background: #e9ecef; color: var(--blue); border: 1px solid #dee2e6; padding: 2px 7px; border-radius: 4px; }

    /* ── Etat vide ── */
    .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text-muted); }
    .empty-state i { font-size: 2.8rem; display: block; margin-bottom: .8rem; }
    .empty-state p { font-size: .9rem; margin: 0; }

    /* ── Progress ── */
    .progress { background: #e9ecef; border-radius: 4px; }

    /* ── Filtres ── */
    .form-control, .form-select { background: white; border: 1px solid var(--border); color: var(--text-main); font-size: .85rem; }
    .form-control:focus, .form-select:focus { background: white; border-color: var(--blue); color: var(--text-main); box-shadow: 0 0 0 2px #0d6efd22; }
    .form-label { font-size: .78rem; color: var(--text-muted); margin-bottom: .3rem; }

    /* ── OWASP grid ── */
    .owasp-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: .9rem 1rem; position: relative; overflow: hidden; transition: border-color .2s; }
    .owasp-card:hover { border-color: var(--blue); }
    .owasp-card .code { font-family: monospace; font-size: .85rem; color: var(--blue); font-weight: 700; }
    .owasp-card .nom  { font-size: .88rem; font-weight: 600; margin: .15rem 0 .3rem; color: var(--text-main); }
    .owasp-card .desc { font-size: .75rem; color: var(--text-muted); line-height: 1.4; }
    .owasp-card .count-badge { position: absolute; top: .8rem; right: .8rem; font-size: .75rem; background: #e9ecef; border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; color: var(--text-muted); }
    .owasp-card.has-findings { border-left: 3px solid var(--danger); }
  </style>
</head>
<body>

<!-- ───── Sidebar ───── -->
<nav class="sidebar">
  <div class="sidebar-brand">
    <i class="bi bi-shield-lock-fill"></i>
    <div>
      SecuIA
      <small>Supervision Sécurité IA</small>
    </div>
  </div>

  <div class="nav-section">Navigation</div>
  <ul class="list-unstyled mb-0 px-0">
    <li>
      <a href="{% url 'accueil' %}" class="nav-link {% if request.resolver_match.url_name == 'accueil' %}active{% endif %}">
        <i class="bi bi-grid-1x2"></i> OWASP Top 10
      </a>
    </li>
    <li>
      <a href="{% url 'rapport_scan' %}" class="nav-link {% if request.resolver_match.url_name == 'rapport_scan' %}active{% endif %}">
        <i class="bi bi-file-earmark-bar-graph"></i> Rapport de Scan
      </a>
    </li>
    <li>
      <a href="{% url 'alertes' %}" class="nav-link {% if request.resolver_match.url_name == 'alertes' %}active{% endif %}">
        <i class="bi bi-exclamation-triangle"></i> Alertes
      </a>
    </li>
    <li>
      <a href="{% url 'recommandations' %}" class="nav-link {% if request.resolver_match.url_name == 'recommandations' %}active{% endif %}">
        <i class="bi bi-lightbulb"></i> Recommandations
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-2">
      <span class="badge bg-secondary" style="font-size:.65rem;">Sans DB</span>
      <span>Prêt pour connexion IA</span>
    </div>
  </div>
</nav>

<!-- ───── Contenu ───── -->
<main class="main">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
